<!doctype html>

<html lang="en">

  <head>

    <title>Désolé la page demandée n'est plus disponible</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">

    <style>

      *, *::before, *::after {
        box-sizing: border-box;
      }

      * {
        margin: 0;
      }

      html {
        font-size: 16px;
      }

      body {
        background: black;
        color: white;
        display: grid;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Aptos, Roboto, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        font-size: clamp(1rem, 2.5vw, 2rem);
        -webkit-font-smoothing: antialiased;
        font-style: normal;
        font-weight: 400;
        letter-spacing: -0.0025em;
        line-height: 1.4;
        min-height: 100dvh;
        place-items: center;
        text-rendering: optimizeLegibility;
        -webkit-text-size-adjust: 100%;
      }

      #error-description {
        fill: #d30001;
      }

      #error-id {
        fill: #f0eff0;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: black;
          color: lightgray;
        }

        #error-description {
          fill: #FF6161;
        }

        #error-id {
          fill: #2c2c2c;
        }
      }

      a {
        color: #DB8101;
        font-weight: 700;
        text-decoration: none;

      }

      b, strong {
        font-weight: 700;
      }

      i, em {
        font-style: italic;
      }

      main {
        display: grid;
        gap: 1em;
        padding: 2em;
        place-items: center;
        text-align: center;
      }

      main header {
        width: min(100%, 12em);
      }

      main header svg {
        height: auto;
        max-width: 100%;
        width: 100%;
      }

      main article {
        width: min(100%, 30em);
      }

      main article p {
        font-size: 75%;
      }

      main article br {
        display: none;

        @media(min-width: 48em) {
          display: inline;
        }
      }

      a {
        background: purple;
        padding: 15px;
        color: white;
        text-decoration: none;
        border-radius: 15px;
        width:15%
      }

      .logo-bouton {
        align-items: center;
        vertical-align:text-bottom;
      }

    </style>

  </head>


  <body>

    <!-- This file lives in public/404.html -->

    <main>
      <header>
        <img src="images/404.png" alt="404" width="75%">
      </header>
      <article>
        <p><strong>La page demandée n'existe plus.</strong></p>
        <p> Elle a peut-être été déplacée ou le site a évolué depuis ta dernière visite. 🙂.</p>
      </article>
      <a href="http://www.gameshare.club" alt="Lien du site" title="Revenir à l'accueil de GameShare"><img src="images/icon.png" alt="Logo GameShare mini" width="25%" class="logo-bouton"> Accueil</a>
    </main>

  </body>

</html>
